command:
  - "python"
  - "-m"
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

resources:
  - name: database
    description: "Lakebase Postgres for drilling journal + alerts"
    database:
      instance_name: drilling-cc-db
      database_name: drilling_cc
      permission: CAN_CONNECT_AND_CREATE

env:
  - name: LAKEBASE_INSTANCE
    value: "drilling-cc-db"
  - name: ADME_CATALOG
    value: "adme_adb_sbx_scus_dbx_ws_1"
  - name: ADME_SCHEMA
    value: "adme_client_demo"
  - name: DATABRICKS_WAREHOUSE_ID
    value: "186af4be97756033"
  - name: GENIE_SPACE_ID
    value: "01f13f7f8e201dc3bbf806bdba354f39"

user_api_scopes:
  - sql
  - dashboards.genie
